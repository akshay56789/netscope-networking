version: 0.2

phases:

  install:
    runtime-versions:
      python: 3.12

    commands:
      - echo Installing dependencies...
      - cd netscope-inventory
      - pip install -r requirements.txt

  pre_build:
    commands:
      - echo Running Flake8...
      - flake8 . || true

      - echo Logging into ECR...
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 637423477178.dkr.ecr.us-east-1.amazonaws.com

  build:
    commands:
      - echo Building Docker Image...
      - docker build -t netscope .

      - docker tag netscope:latest 637423477178.dkr.ecr.us-east-1.amazonaws.com/netscope:latest

  post_build:
    commands:
      - docker images
      - echo Pushing Docker Image...
      - docker push 637423477178.dkr.ecr.us-east-1.amazonaws.com/netscope:latest
